services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mgdb_liquibase
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mgdb_liquibase"]
      interval: 5s
      timeout: 5s
      retries: 30
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro

  liquibase:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    working_dir: /liquibase/project
    volumes:
      - ./:/liquibase/project
    entrypoint: ["liquibase", "--defaultsFile=liquibase.properties"]
    command: ["update"]

volumes:
  pgdata:
